name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        working-directory: tv-app
        run: gradle assembleDebug --no-daemon

      - name: Find APK files
        run: |
          find tv-app -name "*.apk" -type f -ls
          APK_PATH=$(find tv-app -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.0-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 星河助手 ${{ steps.version.outputs.tag }}
          files: ${{ env.APK_PATH }}
          body: |
            ## 星河助手 - 最新构建版本
            
            构建时间: ${{ github.event.head_commit.timestamp }}
            提交信息: ${{ github.event.head_commit.message }}
            
            ### 功能
            - 口令安装：输入口令快速下载安装应用
            - 远程推送：通过电脑或手机推送应用到电视
            - 应用管理：管理已安装的应用
            
            ### 下载
            下载下方 APK 文件安装到电视即可使用
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
