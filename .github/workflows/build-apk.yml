name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Docker
        uses: docker://runmymind/docker-android-sdk:ubuntu-standalone
        with:
          args: |
            bash -c "cd /github/workspace/tv-app && ./gradlew assembleDebug"

      - name: Find APK files
        run: find tv-app -name "*.apk" -type f

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 星河助手最新版本
          artifacts: "tv-app/app/build/outputs/apk/**/*.apk"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
