name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: |
            platforms;android-31
            build-tools;31.0.0
            platform-tools

      - name: Install npm dependencies
        working-directory: tv-app
        run: npm install --legacy-peer-deps

      - name: Build web resources
        working-directory: tv-app
        run: npm run build

      - name: Grant execute permission for gradlew
        working-directory: tv-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: tv-app/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        working-directory: tv-app/android
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Find APK files
        id: find_apk
        run: |
          DEBUG_APK=$(find tv-app/android/app/build/outputs/apk -name "*debug*.apk" | head -1)
          RELEASE_APK=$(find tv-app/android/app/build/outputs/apk -name "*release*.apk" | head -1)
          echo "apk_debug=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "apk_release=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "Debug APK: $DEBUG_APK"
          echo "Release APK: $RELEASE_APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yecao-helper-debug
          path: ${{ steps.find_apk.outputs.apk_debug }}
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yecao-helper-release
          path: ${{ steps.find_apk.outputs.apk_release }}
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_apk.outputs.apk_debug }}
            ${{ steps.find_apk.outputs.apk_release }}
          generate_release_notes: true
