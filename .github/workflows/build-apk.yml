name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          cd tv-app
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 星河助手
          path: tv-app/app/build/outputs/apk/debug/*.apk

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 星河助手 - 最新版本
          artifacts: "tv-app/app/build/outputs/apk/debug/*.apk"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 星河助手
            
            纯原生Android TV应用，无需网络即可使用
            
            ### 功能
            - 🔐 口令安装：输入6位口令快速安装应用
            - 📡 远程推送：通过电脑或手机推送应用到电视
            - 📱 应用管理：管理已安装的应用
            
            ### 安装说明
            下载 APK 文件，通过 U 盘或文件管理器安装到电视/盒子
