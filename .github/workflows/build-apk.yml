name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        working-directory: tv-app
        run: gradle assembleDebug --no-daemon --info 2>&1 | tail -200

      - name: Find APK files
        id: find_apk
        run: |
          APK_PATH=$(find tv-app -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.0-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: 星河助手 ${{ steps.version.outputs.tag }}
          artifacts: ${{ steps.find_apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 星河助手 - 最新构建版本
            
            提交信息: ${{ github.event.head_commit.message }}
            
            ### 功能
            - 口令安装：输入口令快速下载安装应用
            - 远程推送：通过电脑或手机推送应用到电视
            - 应用管理：管理已安装的应用
            
            ### 下载
            下载下方 APK 文件安装到电视即可使用
