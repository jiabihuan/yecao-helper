name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Check project structure
        run: |
          ls -la tv-app/
          ls -la tv-app/app/
          cat tv-app/settings.gradle
          cat tv-app/build.gradle
          cat tv-app/app/build.gradle

      - name: Build Debug APK
        working-directory: tv-app
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -150

      - name: Find APK files
        run: find tv-app -name "*.apk" -type f

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 星河助手最新版本
          artifacts: "tv-app/app/build/outputs/apk/**/*.apk"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 星河助手 - 最新构建版本
            
            构建时间: ${{ github.event.head_commit.timestamp }}
            提交信息: ${{ github.event.head_commit.message }}
            
            ### 下载
            - **Debug 版本**：星河助手 debug.apk
