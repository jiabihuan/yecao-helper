name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          cd tv-app
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log | tail -200
          echo "Exit code: $?"
          echo "=== APK files ==="
          find . -name "*.apk" -type f || echo "No APK found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: tv-app/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: tv-app/app/build/outputs/apk/debug/*.apk
