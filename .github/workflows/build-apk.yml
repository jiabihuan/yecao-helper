name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          cd tv-app
          gradle assembleDebug --no-daemon --stacktrace > /tmp/build.log 2>&1
          echo "Exit code: $?"
          echo "=== Last 100 lines ==="
          tail -100 /tmp/build.log
          echo "=== APK files ==="
          find . -name "*.apk" -type f || true
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk
          path: tv-app/app/build/outputs/apk/debug/*.apk
