name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d /tmp/android-sdk
          rm /tmp/sdk.zip
          export ANDROID_HOME=/tmp/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        working-directory: tv-app
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: tv-app
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 || true
          echo "=== GRADLE ERRORS ==="
          cat /home/runner/.gradle/logs/gradle.log 2>/dev/null || echo "No gradle.log found"
          echo "=== BUILD OUTPUT ==="
          find . -name "build.log" -type f -exec cat {} \; 2>/dev/null || echo "No build.log found"

      - name: Build Release APK
        working-directory: tv-app
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Find APK files
        run: find tv-app -name "*.apk" -type f

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 星河助手最新版本
          artifacts: "tv-app/app/build/outputs/apk/**/*.apk"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
