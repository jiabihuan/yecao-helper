name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Build APK
        working-directory: tv-app
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/34.0.0:$PATH
          
          mkdir -p build/intermediates/aapt2
          mkdir -p build/intermediates/apk
          mkdir -p build/generated/source/r/debug
          mkdir -p build/intermediates/classes
          mkdir -p build/intermediates/dex
          mkdir -p build/intermediates/unzipped
          
          aapt2 compile --dir app/src/main/res -o build/intermediates/aapt2/res.zip
          aapt2 link -o build/intermediates/apk/app.apk --manifest app/src/main/AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar --java build/generated/source/r/debug -R build/intermediates/aapt2/res.zip --auto-add-overlay
          
          javac -d build/intermediates/classes --release 11 -cp "$ANDROID_HOME/platforms/android-34/android.jar:build/generated/source/r/debug" $(find app/src/main/java -name "*.java")
          
          d8 $(find build/intermediates/classes -name "*.class") --release --min-api 24 --output build/intermediates/dex
          
          unzip -o build/intermediates/apk/app.apk -d build/intermediates/unzipped
          cp build/intermediates/dex/classes.dex build/intermediates/unzipped/
          
          cd build/intermediates/unzipped
          zip -r ../app-final.apk .
          cd ../..
          
          mkdir -p build/outputs/apk/debug
          cp build/intermediates/app-final.apk build/outputs/apk/debug/星河助手.apk
          zipalign -f 4 build/outputs/apk/debug/星河助手.apk build/outputs/apk/debug/星河助手-aligned.apk
          mv build/outputs/apk/debug/星河助手-aligned.apk build/outputs/apk/debug/星河助手.apk

      - name: Find APK files
        run: find tv-app -name "*.apk" -type f

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: 星河助手最新版本
          artifacts: "tv-app/build/outputs/apk/**/*.apk"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
