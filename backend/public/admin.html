<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野草助手 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }

        .sidebar-logo {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar-subtitle {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .nav-item.active {
            background: rgba(255,255,255,0.15);
            border-left: 3px solid white;
        }

        .nav-icon {
            font-size: 18px;
        }

        .main-content {
            margin-left: 220px;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-name {
            font-size: 14px;
            color: #666;
        }

        .logout-btn {
            padding: 6px 14px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #999;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            padding: 6px 12px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group input {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            width: 100px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #666;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .login-subtitle {
            font-size: 13px;
            color: #999;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-1px);
        }

        .error {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 13px;
            text-align: center;
        }

        .error.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }

        .invite-code-display {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .copy-btn {
            padding: 4px 10px;
            background: #f0f2ff;
            color: #667eea;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }

        .copy-btn:hover {
            background: #e0e5ff;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            max-width: 300px;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">👑</div>
                <div class="login-title">管理后台</div>
                <div class="login-subtitle">野草助手 · 管理员登录</div>
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入管理员用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="login-btn" onclick="doLogin()">登录</button>
            <div class="error" id="loginError"></div>
            <div class="back-link">
                <a href="index.html">← 返回上传页面</a>
            </div>
        </div>
    </div>

    <div id="adminPage" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🌿</div>
                <div class="sidebar-title">野草助手</div>
                <div class="sidebar-subtitle">管理后台</div>
            </div>
            <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
                <span class="nav-icon">📊</span>
                <span>数据概览</span>
            </div>
            <div class="nav-item" data-page="invites" onclick="switchPage('invites')">
                <span class="nav-icon">🎫</span>
                <span>邀请码管理</span>
            </div>
            <div class="nav-item" data-page="users" onclick="switchPage('users')">
                <span class="nav-icon">👥</span>
                <span>用户管理</span>
            </div>
            <div class="nav-item" data-page="files" onclick="switchPage('files')">
                <span class="nav-icon">📦</span>
                <span>文件管理</span>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <div class="page-title" id="pageTitle">数据概览</div>
                <div class="user-info">
                    <span class="user-name">👤 <span id="adminName">admin</span></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
            </div>

            <div id="dashboardPage" class="page-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-value" id="statUsers">0</div>
                        <div class="stat-label">用户总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📦</div>
                        <div class="stat-value" id="statFiles">0</div>
                        <div class="stat-label">文件总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💾</div>
                        <div class="stat-value" id="statSize">0 MB</div>
                        <div class="stat-label">总存储大小</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎫</div>
                        <div class="stat-value" id="statInvites">0</div>
                        <div class="stat-label">邀请码总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="statInvitesUsed">0</div>
                        <div class="stat-label">已使用邀请码</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-value" id="statInvitesUnused">0</div>
                        <div class="stat-label">未使用邀请码</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">快速操作</div>
                    </div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn-primary" onclick="switchPage('invites')">生成邀请码</button>
                        <button class="btn-primary" onclick="switchPage('users')">查看用户</button>
                        <button class="btn-primary" onclick="switchPage('files')">管理文件</button>
                    </div>
                </div>
            </div>

            <div id="invitesPage" class="page-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">邀请码管理</div>
                        <div class="input-group">
                            <input type="number" id="inviteCount" value="1" min="1" max="100" placeholder="数量">
                            <button class="btn-primary" onclick="generateInvites()">批量生成</button>
                        </div>
                    </div>
                    <div class="search-box">
                        <input type="text" id="inviteSearch" placeholder="搜索邀请码..." oninput="filterInvites()">
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>邀请码</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>使用时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="invitesTable">
                            </tbody>
                        </table>
                    </div>
                    <div id="invitesEmpty" class="empty-state">暂无邀请码</div>
                </div>
            </div>

            <div id="usersPage" class="page-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">用户管理</div>
                    </div>
                    <div class="search-box">
                        <input type="text" id="userSearch" placeholder="搜索用户名..." oninput="filterUsers()">
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>上传数量</th>
                                    <th>上传上限</th>
                                    <th>单文件限制</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                            </tbody>
                        </table>
                    </div>
                    <div id="usersEmpty" class="empty-state">暂无用户</div>
                </div>
            </div>

            <div id="filesPage" class="page-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">文件管理</div>
                    </div>
                    <div class="search-box">
                        <input type="text" id="fileSearch" placeholder="搜索文件名或口令..." oninput="filterFiles()">
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>口令</th>
                                    <th>文件名</th>
                                    <th>大小</th>
                                    <th>上传者</th>
                                    <th>下载次数</th>
                                    <th>上传时间</th>
                                    <th>过期时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="filesTable">
                            </tbody>
                        </table>
                    </div>
                    <div id="filesEmpty" class="empty-state">暂无文件</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('yecao_token') || '';
        let currentUser = null;
        let allInvites = [];
        let allUsers = [];
        let allFiles = [];

        function api(path, options = {}) {
            const headers = options.headers || {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            return fetch('/api' + path, { ...options, headers }).then(r => r.json());
        }

        function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showLoginError('请输入用户名和密码');
                return;
            }
            
            hideLoginError();
            api('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(data => {
                if (data.success) {
                    if (data.user.role !== 'admin') {
                        showLoginError('您不是管理员，无法访问管理后台');
                        return;
                    }
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('yecao_token', token);
                    showAdmin();
                    loadAllData();
                } else {
                    showLoginError(data.error);
                }
            });
        }

        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideLoginError() {
            document.getElementById('loginError').classList.remove('show');
        }

        function logout() {
            token = '';
            currentUser = null;
            localStorage.removeItem('yecao_token');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
        }

        function showAdmin() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
            document.getElementById('adminName').textContent = currentUser.username;
        }

        function checkAuth() {
            if (!token) return;
            api('/auth/me').then(data => {
                if (data.success && data.user.role === 'admin') {
                    currentUser = data.user;
                    showAdmin();
                    loadAllData();
                } else {
                    token = '';
                    localStorage.removeItem('yecao_token');
                }
            }).catch(() => {
                token = '';
                localStorage.removeItem('yecao_token');
            });
        }

        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) item.classList.add('active');
            });
            
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(page + 'Page').classList.add('active');
            
            const titles = {
                dashboard: '数据概览',
                invites: '邀请码管理',
                users: '用户管理',
                files: '文件管理'
            };
            document.getElementById('pageTitle').textContent = titles[page] || '管理后台';
        }

        function loadAllData() {
            loadStats();
            loadInvites();
            loadUsers();
            loadFiles();
        }

        function loadStats() {
            api('/admin/stats').then(data => {
                if (data.success) {
                    const s = data.stats;
                    document.getElementById('statUsers').textContent = s.user_count;
                    document.getElementById('statFiles').textContent = s.file_count;
                    document.getElementById('statSize').textContent = formatSize(s.total_size);
                    document.getElementById('statInvites').textContent = s.invite_total;
                    document.getElementById('statInvitesUsed').textContent = s.invite_used;
                    document.getElementById('statInvitesUnused').textContent = s.invite_unused;
                }
            });
        }

        function loadInvites() {
            api('/admin/invites').then(data => {
                if (data.success) {
                    allInvites = data.invites;
                    renderInvites(allInvites);
                }
            });
        }

        function renderInvites(invites) {
            const tbody = document.getElementById('invitesTable');
            const empty = document.getElementById('invitesEmpty');
            
            if (invites.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            tbody.innerHTML = invites.map(inv => `
                <tr>
                    <td>
                        <span class="invite-code-display">${inv.code}</span>
                        <button class="copy-btn" onclick="copyCode('${inv.code}')">复制</button>
                    </td>
                    <td>
                        ${inv.used 
                            ? '<span class="badge badge-success">已使用</span>' 
                            : '<span class="badge badge-warning">未使用</span>'}
                    </td>
                    <td>${formatDateTime(inv.created_at)}</td>
                    <td>${inv.used_at ? formatDateTime(inv.used_at) : '-'}</td>
                    <td>
                        ${!inv.used ? `<button class="btn-danger" onclick="deleteInvite('${inv.id}')">删除</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function filterInvites() {
            const keyword = document.getElementById('inviteSearch').value.trim().toUpperCase();
            if (!keyword) {
                renderInvites(allInvites);
                return;
            }
            const filtered = allInvites.filter(inv => inv.code.includes(keyword));
            renderInvites(filtered);
        }

        function generateInvites() {
            const count = parseInt(document.getElementById('inviteCount').value) || 1;
            if (count < 1 || count > 100) {
                alert('数量需在 1-100 之间');
                return;
            }
            
            api('/admin/invites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ count })
            }).then(data => {
                if (data.success) {
                    alert(`成功生成 ${data.codes.length} 个邀请码`);
                    loadStats();
                    loadInvites();
                } else {
                    alert('生成失败: ' + (data.error || '未知错误'));
                }
            });
        }

        function deleteInvite(id) {
            if (!confirm('确定要删除这个邀请码吗？')) return;
            api('/admin/invites/' + id, { method: 'DELETE' }).then(data => {
                if (data.success) {
                    loadStats();
                    loadInvites();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            });
        }

        function loadUsers() {
            api('/admin/users').then(data => {
                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                }
            });
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            const empty = document.getElementById('usersEmpty');
            
            if (users.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${u.username}</strong></td>
                    <td>
                        ${u.role === 'admin' 
                            ? '<span class="badge badge-info">管理员</span>' 
                            : '<span class="badge badge-success">普通用户</span>'}
                    </td>
                    <td>${u.upload_count || 0}</td>
                    <td>${u.max_uploads}</td>
                    <td>${u.max_file_size_mb} MB</td>
                    <td>${formatDateTime(u.created_at)}</td>
                    <td>
                        ${u.role !== 'admin' ? `<button class="btn-danger" onclick="deleteUser('${u.id}')">删除</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers() {
            const keyword = document.getElementById('userSearch').value.trim().toLowerCase();
            if (!keyword) {
                renderUsers(allUsers);
                return;
            }
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(keyword));
            renderUsers(filtered);
        }

        function deleteUser(id) {
            if (!confirm('确定要删除这个用户吗？该用户的所有文件也将被删除！')) return;
            api('/admin/users/' + id, { method: 'DELETE' }).then(data => {
                if (data.success) {
                    loadStats();
                    loadUsers();
                    loadFiles();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            });
        }

        function loadFiles() {
            api('/admin/files').then(data => {
                if (data.success) {
                    allFiles = data.files;
                    renderFiles(allFiles);
                }
            });
        }

        function renderFiles(files) {
            const tbody = document.getElementById('filesTable');
            const empty = document.getElementById('filesEmpty');
            
            if (files.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            
            const userMap = {};
            allUsers.forEach(u => { userMap[u.id] = u.username; });
            
            tbody.innerHTML = files.map(f => `
                <tr>
                    <td>
                        <span class="invite-code-display">${f.code}</span>
                        <button class="copy-btn" onclick="copyCode('${f.code}')">复制</button>
                    </td>
                    <td title="${f.original_name}">${truncateText(f.original_name, 30)}</td>
                    <td>${formatSize(f.size)}</td>
                    <td>${userMap[f.user_id] || '未知'}</td>
                    <td>${f.download_count || 0}</td>
                    <td>${formatDateTime(f.upload_time)}</td>
                    <td>${formatDateTime(f.expire_time)}</td>
                    <td>
                        <button class="btn-danger" onclick="deleteFile('${f.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterFiles() {
            const keyword = document.getElementById('fileSearch').value.trim().toLowerCase();
            if (!keyword) {
                renderFiles(allFiles);
                return;
            }
            const filtered = allFiles.filter(f => 
                f.original_name.toLowerCase().includes(keyword) || 
                f.code.toLowerCase().includes(keyword)
            );
            renderFiles(filtered);
        }

        function deleteFile(id) {
            if (!confirm('确定要删除这个文件吗？')) return;
            api('/admin/files/' + id, { method: 'DELETE' }).then(data => {
                if (data.success) {
                    loadStats();
                    loadFiles();
                    loadUsers();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            });
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                alert('已复制: ' + code);
            });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '-';
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function truncateText(text, max) {
            if (!text) return '';
            if (text.length <= max) return text;
            return text.substring(0, max) + '...';
        }

        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('loginUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginPassword').focus();
        });

        checkAuth();
    </script>
</body>
</html>
