<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星河助手 - APK口令分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .user-info {
            font-size: 14px;
            color: #666;
        }

        .user-info strong {
            color: #667eea;
        }

        .logout-btn {
            padding: 6px 14px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            background: #f3f4f6;
            border-radius: 10px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .result {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .code-display {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .code-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .code {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }

        .file-info {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .file-info div {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .file-info span:first-child {
            opacity: 0.8;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .copy-btn.copied {
            background: #4ade80;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #667eea;
            font-size: 14px;
        }

        .error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            text-align: center;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 12px;
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 8px;
            font-size: 13px;
            color: #166534;
        }

        .tips-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tips ul {
            padding-left: 20px;
        }

        .tips li {
            margin: 4px 0;
        }

        .upload-new-btn {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-new-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .my-files-section {
            margin-top: 25px;
        }

        .my-files-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .my-files-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .file-item-info {
            flex: 1;
            min-width: 0;
        }

        .file-item-name {
            font-size: 13px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-meta {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .file-item-code {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            margin-right: 8px;
            cursor: pointer;
        }

        .file-item-delete {
            padding: 4px 10px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌿</div>
            <h1>星河助手</h1>
            <p class="subtitle">APK 口令分享 · 电视安装更简单</p>
        </div>

        <div id="authSection">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>

            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="submit-btn" onclick="doLogin()">登录</button>
            </div>

            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="3-20位字符">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位">
                </div>
                <div class="form-group">
                    <label>邀请码</label>
                    <input type="text" id="regInviteCode" placeholder="请输入邀请码">
                </div>
                <button class="submit-btn" onclick="doRegister()">注册</button>
            </div>
        </div>

        <div id="mainSection" style="display: none;">
            <div class="user-bar">
                <div class="user-info">
                    👤 <strong id="usernameDisplay">-</strong>
                    <span style="margin-left: 10px;">已上传 <span id="uploadCount">0</span>/<span id="maxUploads">50</span></span>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📦</div>
                <div class="upload-text">点击或拖拽 APK 文件到此处</div>
                <div class="upload-hint" id="uploadHint">最大支持 100MB · 文件保留 7 天</div>
            </div>
            <input type="file" id="fileInput" accept=".apk">

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">正在上传并生成口令...</div>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="result-title">上传成功！请使用以下口令在电视上安装：</div>
                <div class="code-display">
                    <div class="code-label">分享口令</div>
                    <div class="code" id="codeDisplay">----</div>
                </div>
                <div class="file-info">
                    <div>
                        <span>文件名</span>
                        <span id="fileName">-</span>
                    </div>
                    <div>
                        <span>文件大小</span>
                        <span id="fileSize">-</span>
                    </div>
                    <div>
                        <span>过期时间</span>
                        <span id="expireTime">-</span>
                    </div>
                </div>
                <button class="copy-btn" id="copyBtn">复制口令</button>
                <button class="upload-new-btn" id="uploadNewBtn">上传新文件</button>
            </div>

            <div class="my-files-section">
                <div class="my-files-title">
                    <span>我的上传</span>
                    <span style="font-size: 12px; color: #999; font-weight: normal;">点击口令复制</span>
                </div>
                <div class="my-files-list" id="myFilesList">
                    <div style="text-align: center; color: #999; padding: 20px;">暂无上传记录</div>
                </div>
            </div>
        </div>

        <div class="tips">
            <div class="tips-title">💡 使用说明</div>
            <ul>
                <li>上传 APK 文件，自动生成 4 位分享口令</li>
                <li>在电视上打开星河助手，输入口令即可安装</li>
                <li>文件保留 7 天，过期自动删除</li>
                <li>请确保上传的 APK 文件来源可靠</li>
            </ul>
        </div>

        <div class="footer">
            星河助手 · 让大屏应用安装更简单
        </div>
    </div>

    <script>
        let token = localStorage.getItem('xinghe_token') || '';
        let currentUser = null;

        function api(path, options = {}) {
            const headers = options.headers || {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            return fetch('/api' + path, { ...options, headers }).then(r => r.json());
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }
            
            hideError();
            api('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(data => {
                if (data.success) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('xinghe_token', token);
                    showMain();
                    loadMyFiles();
                } else {
                    showError(data.error);
                }
            });
        }

        function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value.trim();
            
            if (!username || !password || !inviteCode) {
                showError('请填写完整信息');
                return;
            }
            
            hideError();
            api('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, invite_code: inviteCode })
            }).then(data => {
                if (data.success) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('xinghe_token', token);
                    showMain();
                    loadMyFiles();
                } else {
                    showError(data.error);
                }
            });
        }

        function logout() {
            token = '';
            currentUser = null;
            localStorage.removeItem('xinghe_token');
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('mainSection').style.display = 'none';
        }

        function showMain() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
            document.getElementById('usernameDisplay').textContent = currentUser.username;
            document.getElementById('maxUploads').textContent = currentUser.max_uploads;
            document.getElementById('uploadHint').textContent = `最大支持 ${currentUser.max_file_size_mb}MB · 文件保留 7 天`;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function checkAuth() {
            if (!token) return;
            api('/auth/me').then(data => {
                if (data.success) {
                    currentUser = data.user;
                    showMain();
                    loadMyFiles();
                } else {
                    token = '';
                    localStorage.removeItem('xinghe_token');
                }
            }).catch(() => {
                token = '';
                localStorage.removeItem('xinghe_token');
            });
        }

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const codeDisplay = document.getElementById('codeDisplay');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const expireTime = document.getElementById('expireTime');
        const copyBtn = document.getElementById('copyBtn');
        const uploadNewBtn = document.getElementById('uploadNewBtn');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.apk')) {
                showError('请选择 APK 文件');
                return;
            }
            uploadFile(file);
        }

        function uploadFile(file) {
            hideError();
            resultDiv.classList.remove('show');
            uploadArea.style.display = 'none';
            loading.classList.add('show');

            const formData = new FormData();
            formData.append('file', file);

            api('/upload', {
                method: 'POST',
                body: formData
            })
            .then(data => {
                loading.classList.remove('show');
                if (data.success) {
                    showResult(data);
                    loadMyFiles();
                } else {
                    showError(data.error || '上传失败');
                    uploadArea.style.display = 'block';
                }
            })
            .catch(err => {
                loading.classList.remove('show');
                showError('上传失败：' + err.message);
                uploadArea.style.display = 'block';
            });
        }

        function showResult(data) {
            codeDisplay.textContent = data.code;
            fileName.textContent = data.filename;
            fileSize.textContent = formatSize(data.size);
            expireTime.textContent = formatDate(data.expire_time);
            resultDiv.classList.add('show');
            copyBtn.textContent = '复制口令';
            copyBtn.classList.remove('copied');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        copyBtn.addEventListener('click', () => {
            const code = codeDisplay.textContent;
            navigator.clipboard.writeText(code).then(() => {
                copyBtn.textContent = '已复制 ✓';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制口令';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        });

        uploadNewBtn.addEventListener('click', () => {
            resultDiv.classList.remove('show');
            uploadArea.style.display = 'block';
            fileInput.value = '';
        });

        function loadMyFiles() {
            api('/my-files').then(data => {
                if (data.success) {
                    const list = document.getElementById('myFilesList');
                    document.getElementById('uploadCount').textContent = data.files.length;
                    if (data.files.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无上传记录</div>';
                        return;
                    }
                    list.innerHTML = data.files.map(f => `
                        <div class="file-item">
                            <div class="file-item-info">
                                <div class="file-item-name">${f.original_name}</div>
                                <div class="file-item-meta">${formatSize(f.size)} · ${formatDate(f.upload_time)} · ${f.download_count || 0}次下载</div>
                            </div>
                            <div class="file-item-code" onclick="copyCode('${f.code}')" title="点击复制">${f.code}</div>
                            <button class="file-item-delete" onclick="deleteFile('${f.id}')">删除</button>
                        </div>
                    `).join('');
                }
            });
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                alert('口令已复制: ' + code);
            });
        }

        function deleteFile(id) {
            if (!confirm('确定要删除这个文件吗？')) return;
            api('/files/' + id, { method: 'DELETE' }).then(data => {
                if (data.success) {
                    loadMyFiles();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            });
        }

        checkAuth();
    </script>
</body>
</html>
