<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野草助手 - APK口令分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .result {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .code-display {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .code-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .code {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }

        .file-info {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .file-info div {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .file-info span:first-child {
            opacity: 0.8;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .copy-btn.copied {
            background: #4ade80;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #667eea;
            font-size: 14px;
        }

        .error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            text-align: center;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 12px;
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 8px;
            font-size: 13px;
            color: #166534;
        }

        .tips-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tips ul {
            padding-left: 20px;
        }

        .tips li {
            margin: 4px 0;
        }

        .upload-new-btn {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-new-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌿</div>
            <h1>野草助手</h1>
            <p class="subtitle">APK 口令分享 · 电视安装更简单</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📦</div>
            <div class="upload-text">点击或拖拽 APK 文件到此处</div>
            <div class="upload-hint">最大支持 400MB · 文件保留 7 天</div>
        </div>
        <input type="file" id="fileInput" accept=".apk">

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">正在上传并生成口令...</div>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-title">上传成功！请使用以下口令在电视上安装：</div>
            <div class="code-display">
                <div class="code-label">分享口令</div>
                <div class="code" id="codeDisplay">----</div>
            </div>
            <div class="file-info">
                <div>
                    <span>文件名</span>
                    <span id="fileName">-</span>
                </div>
                <div>
                    <span>文件大小</span>
                    <span id="fileSize">-</span>
                </div>
                <div>
                    <span>过期时间</span>
                    <span id="expireTime">-</span>
                </div>
            </div>
            <button class="copy-btn" id="copyBtn">复制口令</button>
            <button class="upload-new-btn" id="uploadNewBtn">上传新文件</button>
        </div>

        <div class="tips">
            <div class="tips-title">💡 使用说明</div>
            <ul>
                <li>上传 APK 文件，自动生成 4 位分享口令</li>
                <li>在电视上打开野草助手，输入口令即可安装</li>
                <li>文件保留 7 天，过期自动删除</li>
                <li>请确保上传的 APK 文件来源可靠</li>
            </ul>
        </div>

        <div class="footer">
            野草助手 · 让大屏应用安装更简单
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const codeDisplay = document.getElementById('codeDisplay');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const expireTime = document.getElementById('expireTime');
        const copyBtn = document.getElementById('copyBtn');
        const uploadNewBtn = document.getElementById('uploadNewBtn');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.apk')) {
                showError('请选择 APK 文件');
                return;
            }

            uploadFile(file);
        }

        function uploadFile(file) {
            hideError();
            resultDiv.classList.remove('show');
            uploadArea.style.display = 'none';
            loading.classList.add('show');

            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                loading.classList.remove('show');
                if (data.success) {
                    showResult(data);
                } else {
                    showError(data.error || '上传失败');
                    uploadArea.style.display = 'block';
                }
            })
            .catch(err => {
                loading.classList.remove('show');
                showError('上传失败：' + err.message);
                uploadArea.style.display = 'block';
            });
        }

        function showResult(data) {
            codeDisplay.textContent = data.code;
            fileName.textContent = data.filename;
            fileSize.textContent = formatSize(data.size);
            expireTime.textContent = formatDate(data.expire_time);
            resultDiv.classList.add('show');
            copyBtn.textContent = '复制口令';
            copyBtn.classList.remove('copied');
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            errorDiv.classList.remove('show');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        copyBtn.addEventListener('click', () => {
            const code = codeDisplay.textContent;
            navigator.clipboard.writeText(code).then(() => {
                copyBtn.textContent = '已复制 ✓';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制口令';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        });

        uploadNewBtn.addEventListener('click', () => {
            resultDiv.classList.remove('show');
            uploadArea.style.display = 'block';
            fileInput.value = '';
        });
    </script>
</body>
</html>
